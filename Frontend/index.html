<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CompenStation</title>
        <link rel="icon" type="image/logo" href="img/logo.png">
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/login.css">
    </head>
    <body>
        
        <div class="login-container">
            <h1 class="large-text">Login</h1>

            <!--Login Input-->
            <form class="login-input">
                <label class="regular-text">Username / Employee ID</label>
                <input type="text">
                <label class="regular-text">Password</label>
                <input type="password">
                <button class="btn-primary" type="submit">Login</button>
            </form>

            <!--Create account and footer-->
            <a href="#">Create account</a>
            
            <div class="brand">
                <img class="logo" src="img/logo.png" alt="logo">
                <p>CompenStation</p>
            </div>
        
            <footer class="regular-text">© 2026 CompenStation</footer>
        </div>

        <script src="js/scripts.js"></script>
    </body>
</html>
